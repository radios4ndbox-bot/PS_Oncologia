/**
 * preload.js
 * Espone al codice HTML/JS dell'app un oggetto `window.electronFS`
 * che sostituisce la File System Access API del browser con
 * chiamate native al file system tramite IPC Electron.
 */
const { contextBridge, ipcRenderer } = require('electron');

contextBridge.exposeInMainWorld('electronFS', {

  // Restituisce il percorso cartella dati salvato (o null se non ancora scelto)
  getDataFolder: () => ipcRenderer.invoke('get-data-folder'),

  // Apre la finestra di dialogo di selezione cartella e salva la scelta
  selectDataFolder: () => ipcRenderer.invoke('select-data-folder'),

  // Legge un file dalla cartella dati
  readJson: (folder, filename) => ipcRenderer.invoke('read-json', folder, filename),

  // Scrive un file nella cartella dati
  writeJson: (folder, filename, content) => ipcRenderer.invoke('write-json', folder, filename, content),

  // Elimina un file dalla cartella dati
  deleteFile: (folder, filename) => ipcRenderer.invoke('delete-file', folder, filename),

  // Verifica esistenza file
  fileExists: (folder, filename) => ipcRenderer.invoke('file-exists', folder, filename),

});
